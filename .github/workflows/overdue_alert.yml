name: ⏰ RuGonDee Overdue Lead Alert

on:
  # ทุก 30 นาทีในเวลาทำการ BKK (08:00–19:30 = 01:00–12:30 UTC)
  # Vercel Hobby tier ไม่อนุญาต cron ที่ frequency มากกว่า daily —
  # ใช้ GitHub Actions แทนตามแบบ score_leads / nurture_leads
  schedule:
    - cron: '0,30 1-12 * * *'
  workflow_dispatch:

concurrency:
  group: overdue-leads
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: ⏰ Trigger overdue alert endpoint
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          CRON_SECRET:   ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing SITE_BASE_URL or CRON_SECRET — skipping"
            exit 0
          fi
          # 200 = handled (with or without leads), anything else = real failure.
          # -f makes curl exit non-zero on HTTP >=400 so the action goes red.
          curl -fsS -X GET "$SITE_BASE_URL/api/cron/overdue-leads" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Accept: application/json"
