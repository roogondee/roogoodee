name: 🤖 RuGonDee Hourly AI Lead Scoring

on:
  # ทุกชั่วโมง — pick up lead ใหม่ภายใน 60 นาทีเข้า admin queue
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# Avoid overlapping runs (would double-score the same lead in the gap
# between SELECT and UPDATE)
concurrency:
  group: score-leads
  cancel-in-progress: false

jobs:
  score:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🤖 Score new leads
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET:          ${{ secrets.SUPABASE_SECRET }}
        run: python scripts/score_leads.py
