name: 📸 RuGonDee Facebook Daily Story

on:
  schedule:
    # 02:00 UTC = 09:00 Bangkok ทุกวัน (เช้า peak time ดู Story)
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      service:
        description: "Override service (glp1/std/ckd/mens) — ปล่อยว่างเพื่อใช้การหมุนวัน"
        required: false
        default: ""
      dry_run:
        description: "Dry run (ไม่ยิง Graph API จริง)"
        required: false
        default: "false"
      ig_autopost:
        description: "โพสต์ IG Story ด้วย (true/false)"
        required: false
        default: "true"

jobs:
  fb_story:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📸 Post daily Story to Facebook Page
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          TOGETHER_API_KEY:         ${{ secrets.TOGETHER_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET:          ${{ secrets.SUPABASE_SECRET }}
          FB_PAGE_ID:               ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN:     ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID:   ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          IG_SYSTEM_USER_TOKEN:     ${{ secrets.IG_SYSTEM_USER_TOKEN }}
          SITE_BASE_URL:            ${{ secrets.SITE_BASE_URL }}
          STORY_FORCE_SERVICE:      ${{ inputs.service }}
          STORY_DRY_RUN:            ${{ inputs.dry_run == 'true' && '1' || '0' }}
          IG_AUTOPOST:              ${{ inputs.ig_autopost == 'false' && '0' || '1' }}
          DISCORD_WEBHOOK_URL:        ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL:          ${{ secrets.SLACK_WEBHOOK_URL }}
          LINE_CHANNEL_ACCESS_TOKEN:  ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_ID:             ${{ secrets.LINE_TARGET_ID }}
        run: python scripts/fb_story.py
