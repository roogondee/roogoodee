name: 📅 RuGonDee Auto-Generate Content Plan

on:
  # ทุกวันอาทิตย์ 08:00 Bangkok (01:00 UTC)
  schedule:
    - cron: '0 1 * * 0'
  # สั่ง manual ได้
  workflow_dispatch:

jobs:
  gen-plan:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: roogondee-web/requirements.txt

      - name: 📦 Install dependencies
        working-directory: roogondee-web
        run: pip install anthropic>=0.34.0 requests>=2.31.0 supabase>=2.3.0

      - name: 📅 Generate Content Plan
        working-directory: roogondee-web
        env:
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL:   ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET:            ${{ secrets.SUPABASE_SECRET }}
        run: python scripts/gen_content_plan.py
