name: 📰 RuGonDee Daily News

on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC = 11:00 Bangkok ทุกวัน (เหลื่อมจาก autopost 02:00 UTC)
  workflow_dispatch:        # รันด้วยมือได้ทุกเมื่อ

jobs:
  gen-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📰 Generate Daily News
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          TOGETHER_API_KEY:         ${{ secrets.TOGETHER_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET:          ${{ secrets.SUPABASE_SECRET }}
          DISCORD_WEBHOOK_URL:        ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL:          ${{ secrets.SLACK_WEBHOOK_URL }}
          LINE_CHANNEL_ACCESS_TOKEN:  ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_ID:             ${{ secrets.LINE_TARGET_ID }}
          FB_PAGE_ID:                 ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN:       ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          REVALIDATE_SECRET:          ${{ secrets.REVALIDATE_SECRET }}
          SITE_URL:                   ${{ secrets.SITE_URL }}
          SITE_BASE_URL:              ${{ secrets.SITE_URL }}
        run: python gen_news.py
