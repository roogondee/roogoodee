name: 📷 RuGonDee Instagram Daily Post

on:
  schedule:
    # 03:00 UTC = 10:00 Bangkok ทุกวัน (เลื่อนจาก FB Story 1 ชม. เพื่อกระจาย API call)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      service:
        description: "Override service (glp1/std/ckd/mens) — ปล่อยว่างเพื่อใช้การหมุนวัน"
        required: false
        default: ""
      skip_feed:
        description: "ข้าม feed post (true/false)"
        required: false
        default: "false"
      skip_story:
        description: "ข้าม story (true/false)"
        required: false
        default: "false"
      dry_run:
        description: "Dry run (ไม่ยิง Graph API จริง)"
        required: false
        default: "false"

jobs:
  ig_post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📷 Post daily feed + story to Instagram
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          TOGETHER_API_KEY:         ${{ secrets.TOGETHER_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET:          ${{ secrets.SUPABASE_SECRET }}
          IG_USER_ID:               ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:          ${{ secrets.IG_ACCESS_TOKEN }}
          SITE_BASE_URL:            ${{ secrets.SITE_BASE_URL }}
          IG_FORCE_SERVICE:         ${{ inputs.service }}
          IG_SKIP_FEED:             ${{ inputs.skip_feed == 'true' && '1' || '0' }}
          IG_SKIP_STORY:            ${{ inputs.skip_story == 'true' && '1' || '0' }}
          IG_DRY_RUN:               ${{ inputs.dry_run == 'true' && '1' || '0' }}
          DISCORD_WEBHOOK_URL:        ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL:          ${{ secrets.SLACK_WEBHOOK_URL }}
          LINE_CHANNEL_ACCESS_TOKEN:  ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_ID:             ${{ secrets.LINE_TARGET_ID }}
        run: python scripts/ig_post.py
