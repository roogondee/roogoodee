name: 📊 RuGonDee Sync Metrics

on:
  schedule:
    - cron: "0 18 * * *"   # 18:00 UTC = 01:00 Bangkok วันใหม่ (ดึงสถิติของวันก่อน)
  workflow_dispatch:

jobs:
  sync_metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📊 Sync metrics
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET:          ${{ secrets.SUPABASE_SECRET }}
          PLAUSIBLE_API_KEY:        ${{ secrets.PLAUSIBLE_API_KEY }}
          PLAUSIBLE_SITE_ID:        ${{ secrets.PLAUSIBLE_SITE_ID }}
        run: python scripts/sync_metrics.py
