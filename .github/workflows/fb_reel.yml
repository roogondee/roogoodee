name: 🎬 RuGonDee Facebook Daily Reel

on:
  schedule:
    # 04:00 UTC = 11:00 Bangkok ทุกวัน (หลัง Story 09:00 — แยกช่วง engagement)
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      service:
        description: "Override service (glp1/std/ckd) — ปล่อยว่างเพื่อใช้การหมุนวัน"
        required: false
        default: ""
      duration:
        description: "ความยาวคลิป (4 / 8 / 12 วินาที)"
        required: false
        default: "8"
      resolution:
        description: "ความละเอียด (480p / 720p / 1080p)"
        required: false
        default: "1080p"
      dry_run:
        description: "Dry run — แค่ gen prompt ไม่ยิง Seedance + FB"
        required: false
        default: "false"
      local_only:
        description: "Gen video แต่ไม่โพสต์ FB (ดูคุณภาพก่อน)"
        required: false
        default: "false"

jobs:
  fb_reel:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🎬 Post daily Reel to Facebook Page
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          KIE_API_KEY:              ${{ secrets.KIE_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET:          ${{ secrets.SUPABASE_SECRET }}
          FB_PAGE_ID:               ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN:     ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          SITE_BASE_URL:            ${{ secrets.SITE_BASE_URL }}
          REEL_FORCE_SERVICE:       ${{ inputs.service }}
          REEL_DURATION:            ${{ inputs.duration || '8' }}
          REEL_RESOLUTION:          ${{ inputs.resolution || '1080p' }}
          REEL_DRY_RUN:             ${{ inputs.dry_run == 'true' && '1' || '0' }}
          REEL_LOCAL_ONLY:          ${{ inputs.local_only == 'true' && '1' || '0' }}
          DISCORD_WEBHOOK_URL:        ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL:          ${{ secrets.SLACK_WEBHOOK_URL }}
          LINE_CHANNEL_ACCESS_TOKEN:  ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_ID:             ${{ secrets.LINE_TARGET_ID }}
        run: python scripts/fb_reel.py

      - name: 📤 Upload local video preview (local_only mode)
        if: ${{ inputs.local_only == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: fb-reel-preview
          path: /tmp/fb-reel-*.mp4
          retention-days: 7
          if-no-files-found: ignore
