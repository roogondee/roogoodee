name: 🌿 RuGonDee AutoPost

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC = 09:00 Bangkok ทุกวัน
  workflow_dispatch:        # รันด้วยมือได้ทุกเมื่อ

jobs:
  autopost:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run AutoPost
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          TOGETHER_API_KEY:         ${{ secrets.TOGETHER_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET:          ${{ secrets.SUPABASE_SECRET }}
          WP_URL:                   ${{ secrets.WP_URL }}
          WP_USER:                  ${{ secrets.WP_USER }}
          WP_APP_PASS:              ${{ secrets.WP_APP_PASS }}
          DISCORD_WEBHOOK_URL:        ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL:          ${{ secrets.SLACK_WEBHOOK_URL }}
          LINE_CHANNEL_ACCESS_TOKEN:  ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_ID:             ${{ secrets.LINE_TARGET_ID }}
          LINE_NOTIFY_TOKEN:          ${{ secrets.LINE_NOTIFY_TOKEN }}
          REVALIDATE_SECRET:          ${{ secrets.REVALIDATE_SECRET }}
          SITE_URL:                   ${{ secrets.SITE_URL }}
        run: python scripts/autopost.py
